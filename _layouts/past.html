---
layout: default
---
<article class="past-conference">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
    {% if page.dates %}<p class="dates">{{ page.dates }}</p>{% endif %}
    {% if page.location %}<p class="location">{{ page.location }}</p>{% endif %}
    {% if page.organizers %}<p class="organizers">Organized by {{ page.organizers }}</p>{% endif %}
  </header>

  {{ content }}

  <p class="back-link"><a href="{{ '/' | relative_url }}">&larr; Back to Home</a></p>
</article>
