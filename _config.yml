title: Minnesota Workshop in Macroeconomic Theory
description: >-
  A workshop on dynamic macroeconomic theory sponsored by the University of
  Minnesota and the Federal Reserve Bank of Minneapolis.
url: "https://mnmacro.github.io"
baseurl: ""

permalink: pretty
markdown: kramdown
highlighter: rouge

# Conference state — drives what is shown on the Home page and in the nav.
# Valid states: inactive | cfp | deadline_passed | active
conference:
  year: 2026
  state: active

  dates_short: "July 29 – 31, 2026"
  dates_long: "Wednesday, July 29 through Friday, July 31, 2026"
  dates_general: "summer of 2026"
  num_talks: 14

  organizers_short: "<strong>Alessandra Fogli</strong> (Minneapolis Fed) and <strong>Pablo Kurlat</strong> (University of Southern California)"
  organizers_long: "<strong>Alessandra Fogli</strong> (Federal Reserve Bank of Minneapolis) and <strong>Pablo Kurlat</strong> (University of Southern California)"

  # CFP state
  submission_url: "https://forms.gle/vqCbXq87iwmzqURS7"
  submission_deadline: "Friday April 24, 2026"

  # Active state
  registration_deadline: "July 15"
  hotel_deadline: "July 7"
  venue_html: 'first floor of <a href="https://campusmaps.umn.edu/herbert-m-hanson-jr-hall">Hanson Hall</a> on the west bank of the University of Minnesota''s Twin Cities campus'

# Years of past conferences (newest first). 2020 is omitted (no workshop that year).
past_years:
  - 2025
  - 2024
  - 2023
  - 2022
  - 2021
  - 2019
  - 2018
  - 2017
  - 2016
  - 2015
  - 2014
  - 2013
  - 2012
  - 2011
  - 2010
  - 2009
  - 2008
  - 2007
  - 2006
  - 2005
  - 2004
  - 2003
  - 2002
  - 2001
  - 2000

defaults:
  - scope:
      path: "past"
    values:
      layout: past

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - "*.zip"
