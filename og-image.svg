<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Maroon background matching header -->
  <rect width="1200" height="630" fill="#7A0019"/>

  <!-- Top eyebrow -->
  <rect x="500" y="245" width="200" height="3" fill="#FFCC33"/>
  <text x="600" y="285"
        font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="20" font-weight="500" letter-spacing="6"
        fill="#FFCC33" text-anchor="middle">
    UNIVERSITY OF MINNESOTA
  </text>

  <!-- Conference title -->
  <text x="600" y="345"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="56" font-weight="700" letter-spacing="-0.01em"
        text-anchor="middle"><tspan fill="#FFCC33">Minnesota</tspan><tspan fill="#FFFFFF"> Workshop</tspan></text>
  <text x="600" y="415"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="56" font-weight="700" letter-spacing="-0.01em"
        text-anchor="middle"><tspan fill="#FFFFFF">in </tspan><tspan fill="#FFCC33">Macro</tspan><tspan fill="#FFFFFF">economic Theory</tspan></text>

  <!-- Bottom gold band -->
  <rect y="623" width="1200" height="7" fill="#FFCC33"/>
</svg>
